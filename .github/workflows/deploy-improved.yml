name: Deploy - Build and Deploy (Improved)

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'  # Deploy on version tags
  release:
    types: [published]
  workflow_dispatch:  # Allow manual triggering
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
      version:
        description: 'Specific version/tag to deploy'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_BUILDKIT: 1
  # 優化設置
  COMPOSE_DOCKER_CLI_BUILD: 1
  DOCKER_BUILDKIT: 1

jobs:
  pre-deploy-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Validate deployment configuration
      run: |
        echo "=== Validating Deployment Configuration ==="
        
        # 檢查必要的文件
        echo "Checking required files..."
        [ -f "docker-compose.yml" ] || { echo "❌ docker-compose.yml not found"; exit 1; }
        [ -f ".env.example" ] || { echo "❌ .env.example not found"; exit 1; }
        [ -f "Dockerfile" ] || { echo "❌ Dockerfile not found"; exit 1; }
        [ -f "Dockerfile.frontend" ] || { echo "❌ Dockerfile.frontend not found"; exit 1; }
        
        # 檢查 docker-compose 語法
        echo "Validating docker-compose.yml..."
        docker-compose config --quiet
        
        # 檢查環境變數模板
        echo "Checking environment variables..."
        if grep -q "your_api_key_here" .env.example; then
          echo "⚠️  .env.example contains placeholder values (expected)"
        fi
        
        echo "✅ Deployment configuration validation passed!"

  build-and-push:
    runs-on: ubuntu-latest
    needs: pre-deploy-validation
    permissions:
      contents: read
      packages: write
      id-token: write  # For OIDC token
    
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile
            image: backend
          - dockerfile: Dockerfile.frontend
            image: frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: |
          image=moby/buildkit:master
          network=host
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,format=short
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./${{ matrix.dockerfile }}
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image }}:${{ steps.meta.outputs.version }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image }}:latest
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
        provenance: false
        sbom: true
    
    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image }}:${{ steps.meta.outputs.version }}
        format: spdx-json
        output-file: sbom-${{ matrix.image }}.json
    
    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom-${{ matrix.image }}
        path: sbom-${{ matrix.image }}.json
        retention-days: 90
  
  generate-release-artifacts:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download SBOMs
      uses: actions/download-artifact@v4
      with:
        path: sboms
        pattern: sbom-*
        merge-multiple: true
    
    - name: Generate deployment artifacts
      run: |
        # Create deployment directory
        mkdir -p deployment
        
        # Get version information
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION=$(git describe --tags --always --dirty)
        fi
        
        # Copy docker-compose.yml
        cp docker-compose.yml deployment/
        
        # Copy environment template
        cp .env.example deployment/.env.template
        
        # Create deployment script
        cat > deployment/deploy.sh << 'EOF'
        #!/bin/bash
        set -e
        
        echo "🚀 Starting AutoFormFill deployment..."
        echo "Version: $VERSION"
        echo "Timestamp: $(date)"
        
        # Check if .env file exists
        if [ ! -f .env ]; then
          echo "❌ .env file not found. Please copy .env.template to .env and fill in the values."
          exit 1
        fi
        
        # Validate environment variables
        echo "🔍 Validating environment variables..."
        if ! grep -q "GEMINI_API_KEY=" .env || grep -q "GEMINI_API_KEY=your_api_key_here" .env; then
          echo "❌ Please set a valid GEMINI_API_KEY in .env file"
          exit 1
        fi
        
        # Login to GitHub Container Registry if using private images
        if [[ "$(grep 'image: ghcr.io' docker-compose.yml)" ]]; then
          echo "🔐 Logging in to GitHub Container Registry..."
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        fi
        
        # Pull latest images
        echo "📥 Pulling latest Docker images..."
        docker-compose pull
        
        # Stop and remove old containers
        echo "🛑 Stopping existing containers..."
        docker-compose down --remove-orphans
        
        # Clean up old images
        echo "🧹 Cleaning up old Docker images..."
        docker image prune -f
        
        # Start new containers
        echo "🚀 Starting new containers..."
        docker-compose up -d
        
        # Wait for services to be ready
        echo "⏳ Waiting for services to be ready..."
        sleep 10
        
        # Run health checks
        echo "🏥 Running health checks..."
        
        # Check backend health
        if curl -f http://localhost:8000/health; then
          echo "✅ Backend is healthy"
        else
          echo "❌ Backend health check failed"
          docker-compose logs backend
          exit 1
        fi
        
        # Check frontend (through nginx)
        if curl -f http://localhost:80 > /dev/null 2>&1; then
          echo "✅ Frontend is accessible"
        else
          echo "⚠️ Frontend check failed (might be nginx configuration)"
        fi
        
        echo "✅ Deployment completed successfully!"
        echo "========================================"
        echo "🌐 Frontend: http://localhost:80"
        echo "🔧 Backend API: http://localhost:8000"
        echo "📊 Health check: http://localhost:8000/health"
        echo "📝 API Documentation: http://localhost:8000/docs"
        echo "📋 Service status: docker-compose ps"
        echo "📜 View logs: docker-compose logs -f"
        echo "========================================"
        EOF
        
        chmod +x deployment/deploy.sh
        
        # Create update script
        cat > deployment/update.sh << 'EOF'
        #!/bin/bash
        set -e
        
        echo "🔄 Updating AutoFormFill..."
        
        # Pull latest code
        git pull origin main
        
        # Run deployment script
        ./deploy.sh
        EOF
        
        chmod +x deployment/update.sh
        
        # Create rollback script
        cat > deployment/rollback.sh << 'EOF'
        #!/bin/bash
        set -e
        
        echo "↩️ Rolling back to previous version..."
        
        # Check if we have a backup tag
        if [ -z "$1" ]; then
          echo "Usage: ./rollback.sh <previous-tag>"
          echo "Available tags:"
          git tag --sort=-version:refname | head -10
          exit 1
        fi
        
        PREVIOUS_TAG=$1
        
        # Check if tag exists
        if ! git rev-parse "$PREVIOUS_TAG" >/dev/null 2>&1; then
          echo "❌ Tag '$PREVIOUS_TAG' does not exist"
          exit 1
        fi
        
        # Checkout previous version
        git checkout "$PREVIOUS_TAG"
        
        # Run deployment
        ./deploy.sh
        
        echo "✅ Rollback to $PREVIOUS_TAG completed!"
        EOF
        
        chmod +x deployment/rollback.sh
        
        # Create monitoring script
        cat > deployment/monitor.sh << 'EOF'
        #!/bin/bash
        
        echo "📊 AutoFormFill Monitoring Dashboard"
        echo "===================================="
        
        # Service status
        echo "Service Status:"
        docker-compose ps
        
        echo ""
        
        # Resource usage
        echo "Resource Usage:"
        docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.NetIO}}\t{{.BlockIO}}" || true
        
        echo ""
        
        # Logs (last 10 lines)
        echo "Recent Logs:"
        docker-compose logs --tail=10 --timestamps
        
        echo ""
        
        # Disk usage
        echo "Disk Usage:"
        du -sh data/* 2>/dev/null || echo "No data directory found"
        
        echo ""
        
        # Health check
        echo "Health Check:"
        if curl -s -f http://localhost:8000/health > /dev/null; then
          echo "✅ All systems operational"
        else
          echo "❌ Health check failed"
        fi
        EOF
        
        chmod +x deployment/monitor.sh
        
        # Create backup script
        cat > deployment/backup.sh << 'EOF'
        #!/bin/bash
        set -e
        
        echo "💾 Creating backup..."
        BACKUP_DIR="/backup/autoformfill"
        DATE=$(date +%Y%m%d_%H%M%S)
        
        # Create backup directory
        mkdir -p $BACKUP_DIR
        
        # Backup database
        docker-compose exec -T backend sqlite3 /app/data/smartfill.db ".backup $BACKUP_DIR/smartfill_$DATE.db"
        
        # Backup uploads
        tar -czf $BACKUP_DIR/uploads_$DATE.tar.gz data/uploads/ 2>/dev/null || true
        
        # Backup outputs
        tar -czf $BACKUP_DIR/outputs_$DATE.tar.gz data/outputs/ 2>/dev/null || true
        
        # Keep only last 7 days of backups
        find $BACKUP_DIR -type f -mtime +7 -delete
        
        echo "✅ Backup completed: $BACKUP_DIR/"
        EOF
        
        chmod +x deployment/backup.sh
        
        # Create README for deployment
        cat > deployment/README.md << 'EOF'
        # AutoFormFill Deployment Package
        
        This directory contains everything needed to deploy AutoFormFill.
        
        ## Files
        
        - `docker-compose.yml` - Docker Compose configuration
        - `.env.template` - Environment variables template (copy to `.env` and fill in values)
        - `deploy.sh` - Main deployment script
        - `update.sh` - Update script
        - `rollback.sh` - Rollback to previous version
        - `monitor.sh` - Monitoring dashboard
        - `backup.sh` - Backup script
        
        ## Quick Start
        
        1. Copy `.env.template` to `.env` and fill in your values:
           ```bash
           cp .env.template .env
           nano .env
           ```
        
        2. Make the scripts executable:
           ```bash
           chmod +x *.sh
           ```
        
        3. Run the deployment:
           ```bash
           ./deploy.sh
           ```
        
        ## Environment Variables
        
        Required variables in `.env`:
        - `GEMINI_API_KEY` - Your Google Gemini API key
        - `JWT_SECRET_KEY` - A secure random string for JWT tokens
        
        ## Maintenance
        
        - Update: `./update.sh`
        - Monitor: `./monitor.sh`
        - Backup: `./backup.sh`
        - Rollback: `./rollback.sh <tag>`
        
        ## Support
        
        See the main documentation for more details.
        EOF
        
        # Create deployment package
        tar -czf autoformfill-deployment-$VERSION.tar.gz deployment/
        
        echo "✅ Deployment artifacts generated: autoformfill-deployment-$VERSION.tar.gz"
    
    - name: Upload deployment artifacts
      uses: actions/upload-artifact@v4
      with:
        name: deployment-package
        path: |
          autoformfill-deployment-*.tar.gz
          deployment/
        retention-days: 90
  
  deploy-to-environment:
    runs-on: ubuntu-latest
    needs: [build-and-push, generate-release-artifacts]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download deployment artifacts
      uses: actions/download-artifact@v4
      with:
        name: deployment-package
        path: .
    
    - name: Setup SSH
      if: env.DEPLOY_HOST != ''
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: Deploy to server
      if: env.DEPLOY_HOST != ''
      run: |
        echo "🚀 Deploying to ${{ env.DEPLOY_HOST }}..."
        
        # Extract deployment package
        tar -xzf autoformfill-deployment-*.tar.gz
        
        # Copy to server
        scp -r deployment/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/
        
        # Run deployment on server
        ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
          cd ${{ secrets.DEPLOY_PATH }}
          chmod +x *.sh
          ./deploy.sh
        "
        
        echo "✅ Deployment completed!"
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          autoformfill-deployment-*.tar.gz
        generate_release_notes: true
  
  post-deploy-validation:
    runs-on: ubuntu-latest
    needs: deploy-to-environment
    if: always() && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v'))
    
    steps:
    - name: Validate deployment
      run: |
        echo "=== Post-Deployment Validation ==="
        
        if [ "${{ needs.deploy-to-environment.result }}" == "success" ]; then
          echo "✅ Deployment was successful"
          
          # 這裡可以添加更多的驗證邏輯
          # 例如：檢查服務是否正常運行、API 是否可訪問等
          
        else
          echo "❌ Deployment failed"
          echo "Check the deploy-to-environment job for details"
        fi
        
        echo "=== Deployment Summary ==="
        echo "Environment: ${{ github.event.inputs.environment || 'staging' }}"
        echo "Version: $(git describe --tags --always 2>/dev/null || echo 'unknown')"
        echo "Timestamp: $(date)"
        echo "Status: ${{ needs.deploy-to-environment.result }}"